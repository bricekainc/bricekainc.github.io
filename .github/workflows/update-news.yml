name: Update News Feed

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC
    - cron: "0 18 * * *"  # 18:00 UTC
  workflow_dispatch:      # Allow manual trigger

permissions:
  contents: write         # Needed to commit & push

env:
  # FIX: Addresses the Node.js 20 deprecation warning
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          # FIX: Removed cache: "pip" because it causes an error when no packages are installed

      # ── 3. Run the aggregator ────────────────────────────────────────────
      - name: Fetch RSS feeds and generate files
        run: python scripts/fetch_news.py

      # ── 4. Commit changes ────────────────────────────────────────────────
      - name: Commit and push updated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Add folders/files if they exist
          git add data/news.json news/ sitemap.xml || true

          # Only commit if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit — feeds unchanged."
          else
            TIMESTAMP=$(date -u +"%Y-%m-%d %H:%M UTC")
            git commit -m "chore: update news feed [${TIMESTAMP}] [skip ci]"
            git push
            echo "✓ Changes pushed to repository."
          fi
